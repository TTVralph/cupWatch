<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#020617" />
    <title>CupWatch is offline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background:
          radial-gradient(circle at top left, rgba(34, 211, 238, 0.18), transparent 30rem),
          linear-gradient(180deg, #020617 0%, #08111f 52%, #0f172a 100%);
        color: #f8fafc;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(100%, 28rem);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 2rem;
        background: rgba(15, 23, 42, 0.76);
        padding: 1.5rem;
        box-shadow: 0 1.5rem 4rem rgba(2, 6, 23, 0.42);
      }
      .mark {
        display: grid;
        width: 4rem;
        height: 4rem;
        place-items: center;
        border-radius: 1.25rem;
        background: #10b981;
        color: #020617;
        font-size: 1.5rem;
        font-weight: 900;
      }
      h1 { margin: 1.25rem 0 0; font-size: 2rem; line-height: 1; }
      p { margin: 1rem 0 0; color: #cbd5e1; line-height: 1.6; font-weight: 650; }
      a { color: #a7f3d0; font-weight: 900; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">CW</div>
      <h1>CupWatch is offline</h1>
      <p>Your installed app is ready, but live matches, standings, bracket updates, and news need a connection. Reopen CupWatch when you are back online.</p>
      <p><a href="/">Try loading CupWatch again</a></p>
    </main>
  </body>
</html>
